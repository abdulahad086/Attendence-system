version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: attend_pg_db
    restart: always
    environment:
      POSTGRES_USER: attend_user
      POSTGRES_PASSWORD: attend_pass
      POSTGRES_DB: attendance_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: attend_api
    restart: always
    environment:
      DATABASE_URL: postgresql://attend_user:attend_pass@db:5432/attendance_db
      SECRET_KEY: produciton-secret-key-123
      FACE_IMAGES_DIR: /app/data/face_images
    volumes:
      - ./backend/data/face_images:/app/data/face_images
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: attend_web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
